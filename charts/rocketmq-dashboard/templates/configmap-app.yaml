apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.app.configMapName" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  JAVA_OPTS: |
    -Drocketmq.config.namesrvAddr={{ .Values.rocketmq.namesrvAddr }}
    -Drocketmq.config.isVipChannel={{ .Values.rocketmq.isVipChannel }}
    -Drocketmq.config.timeoutMillis={{ .Values.rocketmq.timeoutMillis }}
    -Drocketmq.config.loginRequired={{ .Values.auth.enabled }}
