apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "dashboard.app.configMapName" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  JAVA_OPTS: >-
    -Dserver.port={{ .Values.containerPorts.dashboard }}
    -Drocketmq.config.loginRequired={{ .Values.auth.enabled }}
    -Drocketmq.config.dataPath={{ include "dashboard.dataPath" . }}
    -Drocketmq.config.namesrvAddrs={{ include "dashboard.rocketmq.namesrvAddrs" . }}
    -Drocketmq.config.isVipChannel={{ .Values.rocketmq.isVIPChannel }}
    -Drocketmq.config.timeoutMillis={{ .Values.rocketmq.timeoutMillis }}
