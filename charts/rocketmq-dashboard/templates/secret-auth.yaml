{{- if (include "dashboard.auth.createSecret" .) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "dashboard.auth.secretName" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
type: Opaque
data:
# ,1 定义管理员用户
# https://github.com/apache/rocketmq-dashboard/blob/master/docs/1_0_0/UserGuide_CN.md#%E7%99%BB%E5%BD%95%E8%AE%BF%E9%97%AEdashboard
  users.properties: {{ printf "%s=%s,1" .Values.auth.username .Values.auth.password | b64enc }}
{{- end -}}